name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for Turborepo's --affected flag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── Quality gates ───────────────────────────────────────────────────────

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check-types

      - name: Run tests
        run: npm run test

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Build all packages and apps
        run: npm run build
        env:
          # Build-time env vars required by apps/demo vite.config.ts
          NODE_ENV: production

      # ── Upload build artifacts (optional — uncomment for deployment pipelines)

      # - name: Upload dist
      #   uses: actions/upload-artifact@v4
